name: Saxbys Coffee
description: |
  Saxbys is a Philadelphia-headquartered hospitality company founded in 2005 by
  Nick Bayer that operates a small chain of cafes across the U.S. East Coast and
  Midwest. The brand is unique for its "Experiential Learning Platform" (E.L.P.) —
  100% student-run cafes embedded inside college and university campuses. Each
  E.L.P. cafe is operated by a Student Cafe Executive Officer (SCEO) who takes
  full responsibility for running the location while earning paid, experiential
  learning credit. Saxbys describes itself as "a national education company and
  For Students, By Students" with a mission to "Make Life Better."

  Saxbys does not publish a public REST API, OpenAPI specification, SDK,
  developer portal, or partner integration program. The only public digital
  surfaces are the marketing website (saxbyscoffee.com), location-specific
  online ordering powered by BentoBox, a "Saxbys Stories" blog, and a mobile
  ordering / rewards app. The Saxbys GitHub organization exists but currently
  holds a single internal inventory-analyzer repository. This apis.yml records
  the company as a non-API hospitality + education brand for the API Evangelist
  network catalog.
